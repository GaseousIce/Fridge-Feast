name: Fridge Feast Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: lint
        run: bun run lint
      - name: typecheck
        run: bun run typecheck
      - name: format
        run: bun run format:check
      - name: test
        run: bun run test
      - name: notify vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - fridge-feast: check
